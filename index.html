<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Central de Denúncias</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  color: white;
  text-align: center;
}

.container {
  margin-top: 80px;
  background: rgba(0,0,0,0.6);
  padding: 25px;
  border-radius: 15px;
  width: 320px;
  margin-left: auto;
  margin-right: auto;
  box-shadow: 0 0 25px #a855f7;
}

h1 {
  color: #c084fc;
  text-shadow: 0 0 15px #a855f7;
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border: none;
  border-radius: 8px;
  outline: none;
}

input, select {
  background: #1e1b4b;
  color: white;
}

button {
  background: linear-gradient(90deg, #a855f7, #9333ea);
  color: white;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 15px #a855f7;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

.loading {
  display: none;
  margin-top: 20px;
}

.bar {
  width: 100%;
  height: 10px;
  background: #1e1b4b;
  border-radius: 5px;
  overflow: hidden;
}

.progress {
  width: 0%;
  height: 100%;
  background: #a855f7;
  animation: load 3s linear forwards;
}

@keyframes load {
  from { width: 0%; }
  to { width: 100%; }
}

.popup {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #a855f7;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 25px #c084fc;
}
</style>
</head>

<body>

<div class="container">
  <h1>Central de Denúncias</h1>

  <input type="text" id="numero" placeholder="Digite o número">

  <select id="qtd">
    <option value="">Selecione a quantidade</option>
    <option>10</option>
    <option>20</option>
    <option>30</option>
    <option>40</option>
    <option>50</option>
    <option>60</option>
    <option>70</option>
    <option>80</option>
    <option>90</option>
    <option>100</option>
  </select>

  <button onclick="denunciar()">Denunciar</button>

  <div class="loading" id="loading">
    <p>Processando denúncias...</p>
    <div class="bar">
      <div class="progress"></div>
    </div>
  </div>
</div>

<div class="popup" id="popup">
  ✔ Ação concluída com sucesso!
</div>

<script>
function denunciar() {
  let numero = document.getElementById("numero").value;
  let qtd = document.getElementById("qtd").value;

  if (!numero || !qtd) {
    alert("Preencha tudo!");
    return;
  }

  // só simulação visual agora (sem salvar nada)
  document.getElementById("loading").style.display = "block";

  setTimeout(() => {
    document.getElementById("loading").style.display = "none";
    document.getElementById("popup").style.display = "block";

    setTimeout(() => {
      document.getElementById("popup").style.display = "none";
    }, 3000);

  }, 3000);
}
</script>

</body>
</html>
